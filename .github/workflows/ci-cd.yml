name: Build and Push to ECR

on:
  push:
      # pull_request:
      #     branches: ['main, 'dev']
    branches: ['main']

permissions:
  contents: read
  id-token: write
      

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the code
        uses: actions/checkout@v4

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          severity: HIGH,CRITICAL
          exit-code: "0"

      - name: Build Docker image
        run: |
          docker build -t 891377154217.dkr.ecr.us-east-1.amazonaws.com/my-repo:latest .

      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: 891377154217.dkr.ecr.us-east-1.amazonaws.com/my-repo:latest
          format: table
          exit-code: "0"
          severity: HIGH,CRITICAL
          ignore-unfixed: true
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4 # More information on this action can be found below in the 'AWS Credentials' section
        with:
          role-to-assume: arn:aws:iam::891377154217:role/git-action-role
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
       
      
        
 