name: My first pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Clone the code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t espoirerukundo/my-httpd-portfolio .

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: espoirerukundo
          password: ${{ secrets.DOCKER_PASS }}

      - name: Push Docker image
        run: |
          docker push espoirerukundo/my-httpd-portfolio